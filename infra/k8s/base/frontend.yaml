apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: threatmind
  labels: { app: frontend }
spec:
  replicas: 2
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          image: threatmind/frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              value: "https://api.threatmind.example.com"
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: threatmind
spec:
  selector: { app: frontend }
  ports:
    - port: 80
      targetPort: 3000
