apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: threatmind
  namespace: threatmind
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [threatmind.example.com, api.threatmind.example.com]
      secretName: threatmind-tls
  rules:
    - host: threatmind.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: frontend, port: { number: 80 } }
    - host: api.threatmind.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: backend, port: { number: 80 } }
