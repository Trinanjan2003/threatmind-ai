# ════════════════════════════════════════════════════════════════
#  ThreatMind AI — local development stack
#  All services are free / open-source. Works on macOS, Windows, Linux.
#
#  Usage:  cp .env.example .env && docker compose up -d
#  Observability profile:  docker compose --profile observability up -d
#  Ollama in-stack:        docker compose --profile ai up -d
# ════════════════════════════════════════════════════════════════

services:
  # ─── PostgreSQL: system of record ───
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-threatmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-threatmind_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-threatmind}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-threatmind}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis: cache, pub/sub bus, agent memory ───
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Elasticsearch: normalized event/log search ───
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ─── Ollama: local LLM (free). Optional profile. ───
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    profiles: ["ai"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

  # ─── Backend API (FastAPI) ───
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      ELASTICSEARCH_URL: http://elasticsearch:9200
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    extra_hosts:
      # Lets the container reach a host-native Ollama on macOS/Windows/Linux.
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "alembic upgrade head &&
             python -m app.scripts.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  # ─── Frontend (Next.js) — added in Phase 1 ───
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    profiles: ["frontend"]
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # ─── Prometheus + Grafana (observability profile) ───
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    profiles: ["observability"]
    volumes:
      - ./infra/docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  postgres-data:
  redis-data:
  es-data:
  ollama-data:
  grafana-data:
