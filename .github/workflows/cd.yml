name: CD

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ${{ matrix.component }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.component }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.component }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/${{ matrix.component }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy (kustomize)
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Render manifests
        run: |
          # In a real environment, configure kubeconfig from a secret then:
          #   kubectl apply -k infra/k8s/overlays/prod
          echo "Would apply: kubectl apply -k infra/k8s/overlays/prod"
          echo "Migrations run as an initContainer/Job before rollout."
