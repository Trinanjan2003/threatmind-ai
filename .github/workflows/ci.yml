name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — lint, type, test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: threatmind
          POSTGRES_PASSWORD: threatmind_dev_password
          POSTGRES_DB: threatmind_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U threatmind"
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .
      - name: Format check (ruff)
        working-directory: backend
        run: ruff format --check .
      - name: Type check (mypy)
        working-directory: backend
        run: mypy app
      - name: Security scan (bandit)
        working-directory: backend
        run: bandit -r app -ll
      - name: Tests + coverage gate
        working-directory: backend
        env:
          POSTGRES_DB: threatmind_test
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=80

  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest
    if: ${{ hashFiles('frontend/package.json') != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Build
        working-directory: frontend
        run: npm run build
